# Python environment for the agent skills. This manifest lives inside the
# canonical agent directory and is mirrored into every agent surface, so it
# travels with the directory when it is symlinked into a target repository.
# scripts/ensure-env.sh provisions it automatically on repo open.
#
# The canonical copy is authoritative; the mirrored copies are generated by
# scripts/sync-mirrors.sh — never edit them directly.
[workspace]
name = "agent-skills"
version = "0.1.0"
description = "Python environment for the research-paper and prose skills"
channels = ["conda-forge"]
# List every platform the agent runs on; pixi.lock is solved per-platform, so
# an unlisted platform fails on that machine. Append others as needed
# (e.g. linux-aarch64 for an ARM server).
platforms = ["osx-arm64", "osx-64", "linux-64"]

[dependencies]
python = ">=3.11"
pyyaml = "*"
pypdf = "*"

[pypi-dependencies]
pymupdf4llm = "*"
anthropic = "*"
